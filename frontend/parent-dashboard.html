<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parent Dashboard - SubScript</title>
    <link rel="stylesheet" href="./static/styles.css" />
  </head>
  <body data-page="parent-dashboard">
    <div class="layout">
      <aside class="sidebar">
        <h2>SubScript</h2>
        <nav id="sidebar-nav" class="nav"></nav>
        <div class="card" style="margin-top: 14px;">
          <p id="user-name" style="margin: 0; font-weight: 700;"></p>
          <p id="user-email" class="muted" style="margin: 6px 0 0;"></p>
          <button id="logout-btn" class="btn btn-ghost" style="margin-top: 10px; width: 100%;">Logout</button>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <h1 id="top-title" style="margin: 0; font-size: 1.6rem;"></h1>
        </div>

        <section class="grid grid-3">
          <article class="card kpi-yellow">
            <p>Student Allowance</p>
            <div id="allowance-value" class="value"></div>
          </article>
          <article class="card kpi-purple">
            <p>Recurring Commitments</p>
            <div id="subscription-value" class="value"></div>
          </article>
          <article class="card kpi-green">
            <p>Budget Remaining</p>
            <div id="remaining-value" class="value"></div>
          </article>
        </section>

        <section class="grid grid-2" style="margin-top: 16px;">
          <article class="card">
            <h3 style="margin-top: 0;">Student Snapshot</h3>
            <div id="parent-summary" class="grid"></div>
          </article>
          <article class="card">
            <h3 style="margin-top: 0;">Upcoming Charges To Review</h3>
            <div id="dashboard-charges" class="grid"></div>
          </article>
        </section>

        <section class="grid grid-2" style="margin-top: 16px;">
          <article class="card">
            <h3 style="margin-top: 0;">Trial Approvals</h3>
            <div id="dashboard-trials" class="grid"></div>
          </article>
          <article class="card">
            <h3 style="margin-top: 0;">Recent Student Expenses</h3>
            <div id="dashboard-expenses" class="grid"></div>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="./static/app.js"></script>
  </body>
</html>
